name: carelink_app
description: "CareLink Platform - Medicine donation and distribution system"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  bloc_concurrency: ^0.3.0

  # Networking
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_localizations:
    sdk: flutter
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/app_icon.png
